name: System Patrol

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  system-patrol:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enforce system patrol
        run: npm.cmd run system-patrol:enforce
